<!DOCTYPE html>
<html>

  <head>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.1/dist/aframe-environment-component.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@67d1130/dist/aframe-extras.min.js"></script>
    
    <!-- Custom Components -->
    <script src="https://cdn.jsdelivr.net/gh/addy1997/Robotarm@main/mesh-shadows.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/addy1997/Robotarm@main/animation-list.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/addy1997/Robotarm@main/load-rig.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/addy1997/Robotarm@main/stare-at.js"></script>
  </head>

  <body>
    <div style="position:absolute; z-index: 100; width:100%; visibility:visible;">
      <div id="buttonBox1" style="position:absolute; z-index:101; width:100%; text-align:center; top: 55px;">
        <a href="#" id="clickEvent" onclick="document.querySelector('#Roboarm').components['animation-list'].startExperience()">
          <button id="click">Play Animation</button>
        </a>
      </div>
      <div id="buttonBox2" style="position:absolute; z-index:101; width:100%; text-align:center; top: 85px;">
        <a href="#" id="clickEvent" onclick="document.querySelector('#Roboarm').components['animation-list'].resetAnimations()">
        
          <button id="click2">Reset Animation</button>
        </a>
      </div>
      <div id="feedback" style="width:100%; margin: 20px 0 0 0; color:white; font-size: 2em; text-align:center;">And the feedback is ...</div>
    </div>

    <a-scene>
      <a-assets>
        <!-- Panda robotic arm -->
        <a-asset-item id="Panda" src="https://cdn.glitch.global/a6057469-15a7-42d2-b5e8-f50c53bc9d14/panda_arm.glb?v=1681674072056"></a-asset-item>
      </a-assets>

      <!-- Panda robotic arm glTF -->
      <a-gltf-model id="Roboarm" gltf-model="#Panda" mesh-shadows animation-list load-rig="bone:Arm01-pivot;" position="0 1 -2.25" rotation="0 0 0" animation-mixer="clip: Panda_Reach; timeScale:0; loop:once; clampWhenFinished:true;">
      </a-gltf-model>

      <!-- Box created to support the robotic arm -->
      <a-box position="0 0.5 -2" rotation="0 45 0" color="#4CC3D9" shadow></a-box>
      <a-entity id="centerPoint" position="0 1 -2.25" rotation="0 0 0">
        <a-box id="pickup" width="0.05" height="0.05" depth="0.05" position="0 0.03 0.787" color="#4488DD" visible=true; shadow></a-box>
      </a-entity>

      <!-- -- Green colored plane-->
      <a-plane position="0 0.01 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4" shadow="cast:false; receive:true;"></a-plane>

      <!-- enviornment entity -->
      <a-entity environment="preset:forest; lightPosition:-2.0 2.3 1.6; shadow:true; shadowSize:5;"></a-entity>

      <!-- camera position -->
      <a-entity id="cameraRig" movement-controls="speed:0.2;">
        <a-entity id="camera" camera position="0 1.65 0" look-controls="pointerLockEnabled:true;"></a-entity>
      </a-entity>
    </a-scene>
  </body>

</html>
