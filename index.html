    <!-- Custom component for camera logging -->
    <script>
      AFRAME.registerComponent('camera-logger', {
        schema: {
          timestamp: {
            type: 'int'
          },
          seconds: {
            type: 'int'
          }
        },
        init: function() {
          var cameraEl = this.el.sceneEl.camera.el;
          var rotation = cameraEl.getAttribute('rotation');
          var worldPos = new THREE.Vector3();
          worldPos.setFromMatrixPosition(cameraEl.object3D.matrixWorld);
          console.log("Time: " + this.data.seconds + "; Camera Position: (" + worldPos.x.toFixed(2) + ", " + worldPos.y.toFixed(2) + ", " + worldPos.z.toFixed(2) + "); Camera Rotation: (" + rotation.x.toFixed(2) + ", " + rotation.y.toFixed(2) + ", " + rotation.z.toFixed(2) + ")");
        },
        play: function() {
          this.data.timestamp = Date.now();
          this.init();
        },
        tick: function() {
          if (Date.now() - this.data.timestamp > 1000) {
            this.data.timestamp += 1000;
            this.data.seconds += 1;
            this.init();
          }
        },
      });

    </script>
    <!-- component to animate the meshes -->
    <script>
      AFRAME.registerComponent('animate', {
        init: function() {
          // wait until the model is loaded
          this.el.addEventListener("model-loaded", evt => {
            const mixer = new THREE.AnimationMixer(this.el.components['gltf-model'].model);
            const clips = this.el.components['gltf-model'].model.animations[0];
            mixer.clipAction(clips).play();
            // "expose" the animation mixer
            this.mixer = mixer;
          })
        },
        // on each render loop (actually before each render loop)
        tick: function(t, dt) {
          if (!this.mixer) return; // if the mixer exists
          this.mixer.update(dt / 1000) // update it with the delta time
        }
      })

    </script>
    <!-- component for mesh shadows -->
    <script>
      AFRAME.registerComponent('mesh-shadows', {
        init: function() {
          this.el.addEventListener('model-loaded', () => {
            const el = this.el;
            const obj = el.getObject3D('mesh');
            obj.traverse(function(node) {
              if (node.isMesh) {
                node.castShadow = true;
                node.receiveShadow = true;
                node.material.shadowSide = 1;
                node.material.roughness = 0.60;
                if (node.material.map) {
                  node.material.map.encoding = THREE.LinearEncoding;
                }
              }
            });
          });
        },
      });

    </script>

    <!-- Component to pinch objects from a 'min pinchDistance'-->
    <script>
      AFRAME.registerComponent('pinchable', {
        schema: {
          pinchDistance: {
            default: 0.1
          }
        },
        init: function() {
          var sceneEl = this.el.sceneEl;
          this.worldPosition = new THREE.Vector3();
          this.bindMethods();
          this.pinched = false;
          sceneEl.addEventListener('pinchstarted', this.onPinchStarted);
          sceneEl.addEventListener('pinchended', this.onPinchEnded);
          sceneEl.addEventListener('pinchmoved', this.onPinchMoved);
        },

        bindMethods: function() {
          this.onPinchStarted = this.onPinchStarted.bind(this);
          this.onPinchEnded = this.onPinchEnded.bind(this);
          this.onPinchMoved = this.onPinchMoved.bind(this);
        },

        onPinchStarted: function(evt) {
          var pinchDistance = this.calculatePinchDistance(evt.detail.position);
          if (pinchDistance < this.data.pinchDistance) {
            this.el.emit('pinchstarted');
            this.pinched = true;
          }
        },

        calculatePinchDistance: function(pinchWorldPosition) {
          var el = this.el;
          var worldPosition = this.worldPosition;
          var pinchDistance;
          worldPosition.copy(el.object3D.position);
          el.object3D.parent.updateMatrixWorld();
          el.object3D.parent.localToWorld(worldPosition);
          pinchDistance = worldPosition.distanceTo(pinchWorldPosition);
          return pinchDistance;
        },

        onPinchEnded: function(evt) {
          if (this.pinched) {
            this.pinched = false;
            this.el.emit('pinchended');
          }
        },

        onPinchMoved: function(evt) {
          var el = this.el;
          var pinchDistance = this.calculatePinchDistance(evt.detail.position);
          if (!this.pinched) {
            return;
          }
          if (pinchDistance < this.data.pinchDistance) {
            this.el.emit('pinchmoved', evt.detail);
          } else {
            this.pinched = false;
            this.el.emit('pinchended');
          }
        }
      });

    </script>

    <!-- Use this component for High-definition rendering only -->
    <script>
      AFRAME.registerComponent("envmap", {
        init: function() {
          let mesh = this.el.getObject3D("mesh");
          if (mesh) {
            this.loadEnvMap(scene.renderer, this.el);
          } else {
            this.el.addEventListener("model-loaded", () => {
              this.loadEnvMap(this.el.sceneEl.renderer, this.el);
            });
          }
        },

        loadEnvMap: function(renderer, entity) {
          let targetCube = new THREE.WebGLCubeRenderTarget(1048, {
            generateMipmaps: true,
            minFilter: THREE.LinearMipmapNearestFilter,
            magFilter: THREE.NearestFilter
          });
          renderer.tonemapping = THREE.ACESFilmicToneMapping;
          renderer.toneMappingExposure = 1;
          renderer.outputEncoding = THREE.sRGBEncoding;
          renderer.shadowMap.enabled = true;
          renderer.shadowMap.autoUpdate = true;

          let mesh = entity.getObject3D("mesh");
          let texture = new THREE.TextureLoader().load("https://i.imgur.com/fO0KaHy.jpeg", function() {

    <!-- pressable component -->
    <script>
      AFRAME.registerComponent('pressable', {
        schema: {
          pressDistance: {
            default: 0.06
          }
        },

        init: function() {
          this.worldPosition = new THREE.Vector3();
          this.handEls = document.querySelectorAll('[hand-tracking-controls]');
          this.pressed = false;
        },

        tick: function() {
          var handEls = this.handEls;
          var handEl;
          var distance;
          for (var i = 0; i < handEls.length; i++) {
            handEl = handEls[i];
            distance = this.calculateFingerDistance(handEl.components['hand-tracking-controls'].indexTipPosition);
            if (distance < this.data.pressDistance) {
              if (!this.pressed) {
                this.el.emit('pressedstarted');
              }
              this.pressed = true;
              return;
            }
          }
          if (this.pressed) {
            this.el.emit('pressedended');
          }
          this.pressed = false;
        },

        calculateFingerDistance: function(fingerPosition) {
          var el = this.el;
          var worldPosition = this.worldPosition;

          worldPosition.copy(el.object3D.position);
          el.object3D.parent.updateMatrixWorld();
          el.object3D.parent.localToWorld(worldPosition);

          return worldPosition.distanceTo(fingerPosition);
        }
      });

    </script>

    <script>
      AFRAME.registerComponent('button', {
        schema: {
          label: {
            default: 'label'
          },
          width: {
            default: 0.11
          },
          togglable: {
            default: false
          }
        },
        init: function() {
          var el = this.el;
          var labelEl = this.labelEl = document.createElement('a-entity');

          this.color = '#3a50c5';
          el.setAttribute('geometry', {
            primitive: 'box',
            width: this.data.width,
            height: 0.05,
            depth: 0.04
          });

          el.setAttribute('material', {
            color: this.color
          });
          el.setAttribute('pressable', '');

          labelEl.setAttribute('position', '0 0 0.02');
          labelEl.setAttribute('text', {
            value: this.data.label,
            color: 'white',
            align: 'center'
          });

          labelEl.setAttribute('scale', '0.75 0.75 0.75');
          this.el.appendChild(labelEl);

          this.bindMethods();
          this.el.addEventListener('stateadded', this.stateChanged);
          this.el.addEventListener('stateremoved', this.stateChanged);
          this.el.addEventListener('pressedstarted', this.onPressedStarted);
          this.el.addEventListener('pressedended', this.onPressedEnded);
        },

        bindMethods: function() {
          this.stateChanged = this.stateChanged.bind(this);
          this.onPressedStarted = this.onPressedStarted.bind(this);
          this.onPressedEnded = this.onPressedEnded.bind(this);
        },

        update: function(oldData) {
          if (oldData.label !== this.data.label) {
            this.labelEl.setAttribute('text', 'value', this.data.label);
          }
        },

        stateChanged: function() {
          var color = this.el.is('pressed') ? 'green' : this.color;
          this.el.setAttribute('material', {
            color: color
          });
        },

        onPressedStarted: function() {
          var el = this.el;
          el.setAttribute('material', {
            color: 'green'
          });
          el.emit('click');
          if (this.data.togabble) {
            if (el.is('pressed')) {
              el.removeState('pressed');
            } else {
              el.addState('pressed');
            }
          }
        },

        onPressedEnded: function() {
          if (this.el.is('pressed')) {
            return;
          }
          this.el.setAttribute('material', {
            color: this.color
          });
        }
      });

    </script>

      <a-entity id="textArea3" position="0.75 1 2" geometry="primitive: plane;  width: 3; height: 2" material="color: #444444; transparent: true; opacity: 0.80;" align="center" visible="true" text="anchor: center; baseline: center; wrapCount: 40;
				transparent: true; opacity: 0.90; color: #8888FF;
				value: 1 \n 2 \n 3 \n 4" animation__pinchstarted="property: visible; dur: 6; to: true; startEvents: pinchstarted;" color="blue" scale="0.15 0.15 0.15" text-display></a-entity>

      <!-- Camera system -->
      <a-entity id="camera-control" movement-controls="speed:0.2;">

        <!-- Camera head -->
        <a-entity id="camera-head" camera position="-1.45 1 3" look-controls="pointerLockEnabled:true;"></a-entity>

        <!-- Left hand controller -->
        <a-entity id="leftHand" hand-tracking-controls="hand: left; modelColor: #ADD8E6; modelStyle: mesh" hand-tracking-extras drag-rotate="rig: #camera-control" event-set__show="_event: pinchstarted; _target: #textArea; visible: true" event-set__hide="_event: pinchended; _target: #textArea; visible: false" event-set__textshow="_event: pinchmoved; _target: #textArea3; visible: true" event-set__texthide="_event: pinchended; _target: #textArea3; visible: false">
        </a-entity>

        <!-- Right hand controller -->
        <a-entity id="rightHand" hand-tracking-controls="hand: right; modelColor: #ADD8E6; modelStyle: mesh" hand-tracking-extras drag-move="rig: #camera-control; speed: 5" event-set__show="_event: pinchstarted; _target: #textArea2; visible: true" event-set__hide="_event: pinchended; _target: #textArea2; visible: false">
        </a-entity>

      </a-entity>

      <!-- Buttons for dental tools -->
      <a-entity id="dentureButton" button="label:Denture; width: 0.25;" position="-0.85 1 2" event-manager pressable="pressDistance: 0.06" click-denturebutton></a-entity>

      <a-entity id="sickleButton" button="label:Sickle; width: 0.25;" position="-1.15 1 2" event-manager pressable="pressDistance: 0.06" click-sicklebutton></a-entity>

      <a-entity id="compactorButton" button="label:Compactor; width: 0.25;" position="-1.45 1 2" event-manager pressable="pressDistance: 0.06" click-compactorbutton></a-entity>

      <a-entity id="scalpelsButton" button="label:Scalpels ; width: 0.25;" position="-1.75 1 2" event-manager pressable="pressDistance: 0.06" click-scalpelsbutton></a-entity>

      <a-entity id="mirrorButton" button="label:Mirror; width: 0.25;" position="-2.05 1 2" event-manager pressable="pressDistance: 0.06" click-mirrorbutton></a-entity>

      <a-entity id="syringeButton" button="label:Syringe ; width: 0.25;" position="-2.35 1 2" press-syringebutton></a-entity>

      <!-- Buttons for scenarios -->
      <a-entity id="scenario1Button" button="label:Anaesthesia; width: 0.45;" position="-2.85 1.25 2"></a-entity>

      <a-entity id="scenario2Button" button="label:General Examination; width: 0.45;" position="-2.85 1 2"></a-entity>
      <a-entity id="scenario3Button" button="label:Surgery; width: 0.45;" position="-2.85 1.45 2"></a-entity>

      <a-entity id="scenario4Button" button="label:Implant Placement; width: 0.45;" position="-2.85 1.65 2"></a-entity>
      <!-- Lighting -->
      <a-entity light="type: point; color: #f4f4f4; intensity: 0.2" position="8 10 18"></a-entity>
      <a-entity light="type: point; color: #f4f4f4; intensity: 0.2; distance: 0" position="-0.45 1.1 -1.5"></a-entity>
      <a-entity light="type: point; color: #f4f4f4; intensity: 0.2; distance: 0" position="1.45 1.68 -2"></a-entity>
      <a-entity light="type: ambient; color: #f4f4f4; intensity: 0.6;" position="-8 10 -18"></a-entity>

      <a-sky color="#6EBAA7"></a-sky>
    </a-scene>
  </body>

</html>
