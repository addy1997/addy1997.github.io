<!DOCTYPE html>
<html>

  <head>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@67d1130/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gftruj/webzamples@master/aframe/fbx/dist/fbx-model.js"></script>
    <script src="https://unpkg.com/super-hands/dist/super-hands.min.js"></script>

    <!-- Camera logger component -->
    <script>
      AFRAME.registerComponent('camera-logger', {
        schema: {
          timestamp: {
            type: 'int'
          },
          seconds: {
            type: 'int'
          }
        },
        init: function() {
          var cameraEl = this.el.sceneEl.camera.el;
          var rotation = cameraEl.getAttribute('rotation');
          var worldPos = new THREE.Vector3();
          worldPos.setFromMatrixPosition(cameraEl.object3D.matrixWorld);
          console.log("Time: " + this.data.seconds +
            "; Camera Position: (" + worldPos.x.toFixed(2) + ", " + worldPos.y.toFixed(2) + ", " + worldPos.z.toFixed(2) +
            "); Camera Rotation: (" + rotation.x.toFixed(2) + ", " + rotation.y.toFixed(2) + ", " + rotation.z.toFixed(2) + ")");
        },

        play: function() {
          this.data.timestamp = Date.now();
          this.init();
        },

        tick: function() {
          if (Date.now() - this.data.timestamp > 1000) {
            this.data.timestamp += 1000;
            this.data.seconds += 1;
            this.init();
          }
        },
      })

    </script>

    <script>
      AFRAME.registerComponent('move', {
        init: function() {
          // wait until the model is loaded
          this.el.addEventListener("model-loaded", evt => {
            const mixer = new THREE.AnimationMixer(this.el.components['gltf-model'].model);
            const clips = this.el.components['gltf-model'].model.animations[0];
            mixer.clipAction(clips).play();
            // "expose" the animation mixer
            this.mixer = mixer;
          })
        },
        // on each render loop (actually before each render loop)
        tick: function(t, dt) {
          if (!this.mixer) return; // if the mixer exists
          this.mixer.update(dt / 1000) // update it with the delta time
        }
      })

    </script>
    
     <script>
      AFRAME.registerComponent('mesh-shadows', {
        init: function() {
          this.el.addEventListener('model-loaded', () => {
            const el = this.el;
            const obj = el.getObject3D('mesh');
            obj.traverse(function(node) {
              if (node.isMesh) {
                node.castShadow = true;
                node.receiveShadow = true;
                node.material.shadowSide = 1;
                node.material.roughness = 0.60;

                if (node.material.map) {
                  node.material.map.encoding = THREE.LinearEncoding;
                }
              }
            });
          });
        },
      });

    </script>

  </head>

  <body>
    <a-scene>
      <a-assets>

        <!-- Room asset -->
        <a-asset-item id="Room" src="https://raw.githubusercontent.com/addy1997/3D-models/main/Dental%20Models/Room/basic_room_shell.glb"></a-asset-item>

        <!-- Floor asset -->
        <a-asset-item id="Floor" src="https://cdn.jsdelivr.net/gh/addy1997/3D-models@main/Floor/factory_concrete_floor.glb"></a-asset-item>

        <!-- Image asset -->
        <img id="Cloth" src="https://cdn.jsdelivr.net/gh/pmndrs/cannon-es@master/examples/images/sunflower.jpg">
        <!-- chair asset -->
        <a-asset-item id="Dentist-Chair" src="https://raw.githubusercontent.com/addy1997/3D-models/main/Dentist chair/model/Dental chair Granum TS6830 Sonata N251210.glb"></a-asset-item>

        <!-- Dentist asset -->
        <a-asset-item id="Dentist" src="https://cdn.jsdelivr.net/gh/addy1997/3D-models@main/Dentist/model/Dentist.glb"></a-asset-item>

        <!-- Patient asset -->
        <a-asset-item id="Patient" src="https://raw.githubusercontent.com/addy1997/3D-models/main/Dental%20Models/patient/Nathan.glb"></a-asset-item>

        <!-- Table asset -->
        <a-asset-item id="Table" src="https://cdn.jsdelivr.net/gh/addy1997/3D-models@main/Dental%20Models/Table/table_derived.glb"></a-asset-item>

        <!-- Scalpel asset -->
        <a-asset-item id="Scalpels" src="https://cdn.jsdelivr.net/gh/addy1997/3D-models@main/scalpels/models/pair_of_scalpels.glb"></a-asset-item>

        <!-- Drill asset -->
        <a-asset-item id="Drill" src="https://raw.githubusercontent.com/addy1997/3D-models/main/Dental%20Models/drill/drill.FBX"></a-asset-item>

        <!-- Denture asset -->
        <a-asset-item id="Denture" src="https://raw.githubusercontent.com/addy1997/3D-models/main/Dental%20Models/Teeth/3d_denture.glb"></a-asset-item>

        <!-- Filler asset -->
        <a-asset-item id="Filler" src="https://cdn.jsdelivr.net/gh/addy1997/3D-models@main/Dental%20Models/filler/Final_filler_derived.glb"></a-asset-item>
        
        <!-- Chair asset-->
        <a-asset-item id="Office-Chair" src="https://cdn.jsdelivr.net/gh/addy1997/3D-models@main/Dental%20Models/office_chair.glb"></a-asset-item>
        
        <!-- Chair asset-->
        <a-asset-item id="laptop" src="https://cdn.jsdelivr.net/gh/addy1997/3D-models@main/Dental%20Models/laptop.glb"></a-asset-item>
       
      </a-assets>
      
      <!-- Superhand component's left hand entity -->
      <a-entity sphere-collider="objects: a-gltf-model" super-hands hand-controls="hand: left"></a-entity>
      
      <!-- Superhand component's right hand entity -->
      <a-entity sphere-collider="objects: a-gltf-model" super-hands hand-controls="hand: right"></a-entity>
      
      <!-- Denture glTF -->
      <a-gltf-model gltf-model="#Denture" rotation="0 0 0" scale="0.0065 0.0065 0.0065" position="-1.45 0.870 -2.15" hoverable grabbable stretchable draggable droppable mesh-shadows></a-gltf-model>

      <!-- Room glTF -->
      <a-gltf-model gltf-model="#Room" rotation="0 0 0" scale="0.0095 0.0095 0.0095" position="-0.45 0 -1.5"></a-gltf-model>

      <!-- Dentist glTF -->
      <a-gltf-model gltf-model="#Dentist" rotation="0 30 0" scale="0.45 0.45 0.45" position="-0.45 1.435 -1.5" move mesh-shadows></a-gltf-model>

      <!-- Floor glTF -->
      <a-gltf-model gltf-model="#Floor" rotation="0 90 0" scale="0.065 0.065 0.065" position="-0.85 0 -3"></a-gltf-model>

      <!-- Chair glTF -->
      <a-gltf-model gltf-model="#Dentist-Chair" rotation="0 -45 0" scale="2.75 2.75 2.75" position="-1.25 0.175 -2" mesh-shadows></a-gltf-model>

      <!-- Text -->
      <a-text color="Red" value="A Dummy, not a Human!" position="-1.35 1.25 -1" scale="0.5 0.5 0.5" rotation="0 45 0" width="2.0"></a-text>

      <!-- Patient glTF -->
      <a-gltf-model gltf-model="#Patient" rotation="-90 90 0" scale="0.75 0.75 0.75" position="-0.85 0.785 -2" mesh-shadows></a-gltf-model>

      <!-- Table glTF -->
      <a-gltf-model gltf-model="#Table" rotation="0 -90 0" scale="0.195 0.195 0.195" position="1.485 0 -2" mesh-shadows></a-gltf-model>

      <!-- Scalpel glTF -->
      <a-gltf-model gltf-model="#Scalpels" rotation="0 30 0" scale="0.45 0.45 0.45" position="-1.45 0.90 -2.15" mesh-shadows></a-gltf-model>

      <!-- Drill Fbx -->
      <a-entity  fbx-model-loader="src: #Drill;" position="-1.25 0.90 -2.15" scale="0.001 0.001 0.001" rotation="0 -180 0" mesh-shadows>
      </a-entity>

      <!-- Filler glTF -->
      <a-entity gltf-model="#Filler" rotation="0 30 0" scale="0.045 0.045 0.045" position="-1.35 0.90 -2.15" mesh-shadows></a-entity>
      
      <!-- Chair glTF-->
      <a-gltf-model gltf-model="#Office-Chair" rotation="0 30 0" scale="0.045 0.045 0.045" position="1.285 0.15 -2" mesh-shadows></a-gltf-model>
      
      <!-- Laptop glTF-->
      <a-gltf-model gltf-model="#laptop" rotation="0 90 0" scale="0.4 0.4 0.4" position="1.45 0.68 -1.25"  mesh-shadows></a-gltf-model>
      
      <!-- Camera -->
      <a-entity id="camera-control" movement-controls="speed:0.2;">

        <a-entity id="camera" camera position="-0.74 1.25 -0.76" look-controls="pointerLockEnabled:true;"></a-entity>
      </a-entity>

      <!-- Lighting -->
      <a-entity light="type: point; color: #f4f4f4; intensity: 0.4; distance: 0" position="8 10 18"></a-entity>
      <a-entity light="type: point; color: #f4f4f4; intensity: 0.4; distance: 0" position="-0.45 1.1 -1.5"></a-entity>
      <a-entity light="type: point; color: #f4f4f4; intensity: 0.4; distance: 0" position="1.45 1.68 -2"></a-entity>

      <a-entity light="type: ambient; color: #f4f4f4; intensity: 0.6;" position="-8 10 -18"></a-entity>

    </a-scene>
  </body>

</html>
