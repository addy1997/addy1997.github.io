    <!-- Custom component for camera logging -->
    <script>
      AFRAME.registerComponent('camera-logger', {
        schema: {
          timestamp: {
            type: 'int'
          },
          seconds: {
            type: 'int'
          }
        },
        init: function() {
          var cameraEl = this.el.sceneEl.camera.el;
          var rotation = cameraEl.getAttribute('rotation');
          var worldPos = new THREE.Vector3();
          worldPos.setFromMatrixPosition(cameraEl.object3D.matrixWorld);
          console.log("Time: " + this.data.seconds + "; Camera Position: (" + worldPos.x.toFixed(2) + ", " + worldPos.y.toFixed(2) + ", " + worldPos.z.toFixed(2) + "); Camera Rotation: (" + rotation.x.toFixed(2) + ", " + rotation.y.toFixed(2) + ", " + rotation.z.toFixed(2) + ")");
        },
        play: function() {
          this.data.timestamp = Date.now();
          this.init();
        },
        tick: function() {
          if (Date.now() - this.data.timestamp > 1000) {
            this.data.timestamp += 1000;
            this.data.seconds += 1;
            this.init();
          }
        },
      });

    </script>
    <!-- component to animate the meshes -->
    <script>
      AFRAME.registerComponent('animate', {
        init: function() {
          // wait until the model is loaded
          this.el.addEventListener("model-loaded", evt => {
            const mixer = new THREE.AnimationMixer(this.el.components['gltf-model'].model);
            const clips = this.el.components['gltf-model'].model.animations[0];
            mixer.clipAction(clips).play();
            // "expose" the animation mixer
            this.mixer = mixer;
          })
        },
        // on each render loop (actually before each render loop)
        tick: function(t, dt) {
          if (!this.mixer) return; // if the mixer exists
          this.mixer.update(dt / 1000) // update it with the delta time
        }
      })

    </script>
    <!-- component for mesh shadows -->
    <script>
      AFRAME.registerComponent('mesh-shadows', {
        init: function() {
          this.el.addEventListener('model-loaded', () => {
            const el = this.el;
            const obj = el.getObject3D('mesh');
            obj.traverse(function(node) {
              if (node.isMesh) {
                node.castShadow = true;
                node.receiveShadow = true;
                node.material.shadowSide = 1;
                node.material.roughness = 0.60;
                if (node.material.map) {
                  node.material.map.encoding = THREE.LinearEncoding;
                }
              }
            });
          });
        },
      });

    </script>

    <script>

        init: function() {
          var el = this.el
          el.addEventListener('gripdown', function() {
            el.setAttribute('collision-filter', {
              collisionForces: true
            })
          })
          el.addEventListener('gripup', function() {
            el.setAttribute('collision-filter', {
              collisionForces: false
            })
          })
        }
      });

    </script>

    <script>
      // the component has to be defined before the <a-scene>
      AFRAME.registerComponent("show-text", {
        // a schema, so we can provide different <a-text>s
        schema: {
          txt: {
            type: "selector"
          }
        },
        // called upon initialisation
        init: function() {
          // on each click - toggle the visibility
          this.el.addEventListener("click", evt => {
            // if the text is invalid - lets get outta here
            if (!this.data.txt) return;
            // get the current visibility
            const visible = this.data.txt.getAttribute("visible")
            // set the visibility to its opposite
            this.data.txt.setAttribute("visible", !visible)
          })
        }
      })

    </script>

    <script>
      AFRAME.registerComponent('haptics', {
        schema: {
          actuatorIndex: {
            default: 0
          },
          pulseDuration: {
            default: 100
          },
          enabled: {
            default: true
          },
          events: {
            type: 'array'
          },
          eventsFrom: {
            type: 'string'
          },
          pulseIntensity: {
            default: 1
          }
        },

        multiple: true,

        init: function() {
          var data = this.data;
          var i;
          var self = this;

          /*this.callPulse = function() {
            self.pulse();
          };*/
          
          this.bindMethods();

          var doInit = function() {
            self.gamepad = self.el.components['tracked-controls'].controller;
            if (self.gamepad.gamepad || "xr" in window.navigator) {
              // WebXR.
              self.gamepad = self.gamepad.gamepad;
            }
            if (!self.gamepad || !self.gamepad.hapticActuators ||
              !self.gamepad.hapticActuators.length) {
              return;
            }
            self.addEventListeners();
          };

          // There may exist a tracked-controls when this component is initialized
          if (this.el.components['tracked-controls'] && this.el.components['tracked-controls'].controller) {
            doInit();
          } else {
            this.el.addEventListener('controllerconnected', function init() {
              doInit();
            });
          }
        },
        
        bindMethods: function() {
          this.sendPulse = this.sendPulse.bind(this);
        },

        remove: function() {
          this.removeEventListeners();
        },

        sendPulse: function(force, dur) {
          var actuator;
          var data = this.data;
          if (!data.enabled || !this.gamepad || !this.gamepad.hapticActuators) {
            return;
          }
