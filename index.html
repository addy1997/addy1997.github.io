    <script>
      AFRAME.registerComponent('camera-logger', {
        schema: {
          timestamp: {
            type: 'int'
          },
          seconds: {
            type: 'int'
          }
        },
        init: function() {
          var cameraEl = this.el.sceneEl.camera.el;
          var rotation = cameraEl.getAttribute('rotation');
          var worldPos = new THREE.Vector3();
          worldPos.setFromMatrixPosition(cameraEl.object3D.matrixWorld);
          console.log("Time: " + this.data.seconds +
            "; Camera Position: (" + worldPos.x.toFixed(2) + ", " + worldPos.y.toFixed(2) + ", " + worldPos.z.toFixed(2) +
            "); Camera Rotation: (" + rotation.x.toFixed(2) + ", " + rotation.y.toFixed(2) + ", " + rotation.z.toFixed(2) + ")");
        },

        play: function() {
          this.data.timestamp = Date.now();
          this.init();
        },

        tick: function() {
          if (Date.now() - this.data.timestamp > 1000) {
            this.data.timestamp += 1000;
            this.data.seconds += 1;
            this.init();
          }
        },
      });

    </script>
    <script>
      AFRAME.registerComponent('animate', {
        init: function() {
          // wait until the model is loaded
          this.el.addEventListener("model-loaded", evt => {
            const mixer = new THREE.AnimationMixer(this.el.components['gltf-model'].model);
            const clips = this.el.components['gltf-model'].model.animations[0];
            mixer.clipAction(clips).play();
            // "expose" the animation mixer
            this.mixer = mixer;
          })
        },
        // on each render loop (actually before each render loop)
        tick: function(t, dt) {
          if (!this.mixer) return; // if the mixer exists
          this.mixer.update(dt / 1000) // update it with the delta time
        }
      })

    </script>
    <script>
      AFRAME.registerComponent('mesh-shadows', {
        init: function() {
          this.el.addEventListener('model-loaded', () => {
            const el = this.el;
            const obj = el.getObject3D('mesh');
            obj.traverse(function(node) {
              if (node.isMesh) {
                node.castShadow = true;
                node.receiveShadow = true;
                node.material.shadowSide = 1;
                node.material.roughness = 0.60;

                if (node.material.map) {
                  node.material.map.encoding = THREE.LinearEncoding;
                }
              }
            });
          });
        },
      });

    </script>
    <script>
      AFRAME.registerComponent('phase-shift', {
        init: function() {
          var el = this.el
          el.addEventListener('gripdown', function() {
            el.setAttribute('collision-filter', {
              collisionForces: true
            })
          })
          el.addEventListener('gripup', function() {
            el.setAttribute('collision-filter', {
              collisionForces: false
            })
          })
        }
      });

    </script>
