<!DOCTYPE html>
<html>

  <head>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.misc.min.js"></script>

    <script>
      AFRAME.registerComponent('bbox', {
        init: function() {
          // wait until the model is loaded
          const el = this.el;
          this.box1 = new THREE.Box3();
          this.box2 = new THREE.Box3();
          this.helper1 = new THREE.Box3Helper(this.box1, 0x000ff);
          this.helper2 = new THREE.Box3Helper(this.box2, 0xff0000);

          this.el.addEventListener("model-loaded", () => {

            this.el.sceneEl.object3D.add(this.helper1);
            this.el.sceneEl.object3D.add(this.helper2);
           


            const mixer = new THREE.AnimationMixer(this.el.components['gltf-model'].model);
            const clips = this.el.components['gltf-model'].model.animations[0];
            mixer.clipAction(clips).play();
            // "expose" the animation mixer
            this.mixer = mixer;
          })
        },
        // on each render loop (actually before each render loop)
        tick: function(t, dt) {
          const entity = document.querySelector('a-entity');
          const panda = entity.object3D;
          this.box1.setFromObject(this.el.object3D);
          this.box2.setFromObject(panda);
          if (!this.mixer) return; // if the mixer exists
          this.mixer.update(dt / 1000) // update it with the delta time
        },

        remove: function() {
          this.el.sceneEl.object3D.remove(this.helper1);

          this.helper1.geometry.dispose();
          this.helper1.material.dispose();
          this.helper1 = null;

          this.el.sceneEl.object3D.remove(this.helper2);

          this.helper2.geometry.dispose();
          this.helper2.material.dispose();
          this.helper2 = null;
        }
      })

    </script>

  </head>

  <body>

    <a-scene>

      <a-assets>
        <a-asset-item id="Panda-robot" src="https://cdn.jsdelivr.net/gh/addy1997/3D-models@main/Panda/panda_arm_motion_2.glb">
        </a-asset-item>

        <a-asset-item id="Panda-robot2" src="https://cdn.jsdelivr.net/gh/addy1997/3D-models@main/Panda/panda_arm_motion_3.glb">
        </a-asset-item>

        <a-asset-item id="Table" src="https://cdn.jsdelivr.net/gh/addy1997/3D-models@main/Table/wooden_table.glb"></a-asset-item>
      </a-assets>

      <a-gltf-model src="#Panda-robot" position="-2.35 3.45 -3" scale="0.5 0.5 0.5" rotation="0 -45 0" bbox></a-gltf-model>

      <a-entity gltf-model="#Panda-robot2" position="0.65 3.45 -2" scale="0.5 0.5 0.5" rotation="0 -225 0" bbox></a-entity>

      <a-gltf-model src="#Table" rotation="0 90 0" scale="0.015 0.015 0.015" position="-0.85 0 -3" mesh-shadows></a-gltf-model>

      <!--<a-gltf-model src="#Panda-robot2" position="2.5 0 -1" scale="0.5 0.5 0.5" rotation="0 -225 0" bbox></a-gltf-model>-->

      <a-entity position="0 2.75 0">
        <a-camera look-controls="enabled:true" zoom="1" wasd-controls></a-camera>
      </a-entity>

      <a-entity light="type: ambient; intensity: 0.5;"></a-entity>

      <a-entity light="type: directional;
                   castShadow: true;
                   intensity: 0.4;
                   shadowCameraVisible: false;" position="-5 3 1.5"></a-entity>

      <!-- Lighting -->
      <a-entity light="type: point; color: #f4f4f4; intensity: 0.2; distance: 0" position="8 10 18"></a-entity>
      <!--<a-entity light="type: point; color: #f4f4f4; intensity: 0.2; distance: 0" position="-8 10 -18"></a-entity>-->
      <a-entity light="type: ambient; color: #f4f4f4; intensity: 0.4;" position="-8 10 -18"></a-entity>

    </a-scene>
  </body>

</html>
