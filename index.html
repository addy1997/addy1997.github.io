<!DOCTYPE html>
<html>

  <head>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="//cdn.rawgit.com/donmccurdy/aframe-extras/v6.0.0/dist/aframe-extras.min.js"></script>
    <script src="//cdn.rawgit.com/donmccurdy/aframe-physics-system/v3.2.0/dist/aframe-physics-system.min.js"></script>
  </head>

  <body>
    <a-scene physics="debug: true">
      <!-- Player -->
      <a-entity camera look-controls></a-entity>
      <a-entity static-body="shape: sphere; sphereRadius: 0.02;" oculus-touch-controls="hand: left" sphere-collider="objects: .cube;" grab></a-entity>
      <a-entity static-body="shape: sphere; sphereRadius: 0.02;" oculus-touch-controls="hand: right" sphere-collider="objects: .cube;" grab></a-entity>

      <a-box id="cube1" class="cube" dynamic-body position="0 0.25 -1" width="0.5" height="0.5" depth="0.5" color="red"></a-box>
      <a-box id="cube2" class="cube" dynamic-body position="-1 0.25 -1" width="0.5" height="0.5" depth="0.5" color="green"></a-box>
      <a-box id="cube3" class="cube" dynamic-body position="1 0.25 -1" width="0.5" height="0.5" depth="0.5" color="blue"></a-box>

      <!-- Terrain -->
      <a-grid static-body></a-grid>

      <!-- Lighting -->
      <a-entity light="type: point; color: #f4f4f4; intensity: 0.2; distance: 0" position="8 10 18"></a-entity>
      <a-entity light="type: point; color: #f4f4f4; intensity: 0.6; distance: 0" position="-8 10 -18"></a-entity>
      <a-entity light="type: ambient; color: #f4f4f4; intensity: 0.4;" position="-8 10 -18"></a-entity>
    </a-scene>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        let scene = document.querySelector('a-scene');

        document.querySelector('#cube1').addEventListener('collide', (e) => {
          if (e.detail.body.el.id === 'leftController' || e.detail.body.el.id === 'rightController') {
            e.detail.target.el.setAttribute('visible', false);
            document.querySelector('#cube2').setAttribute('visible', 'true');
            document.querySelector('#cube3').setAttribute('visible', 'true');
          }
        });

        document.querySelector('#cube2').addEventListener('collide', (e) => {
          if (e.detail.body.el.id === 'leftController' || e.detail.body.el.id === 'rightController') {
            e.detail.target.el.setAttribute('visible', false);
            document.querySelector('#cube1').setAttribute('visible', 'true');
            document.querySelector('#cube3').setAttribute('visible', 'true');
          }
        });
      });

    </script>
  </body>

</html>
