<html>

  <head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-orbit-controls@1.3.0/dist/aframe-orbit-controls.min.js"></script>
    <script>
      AFRAME.registerComponent("envmap", {
        init: function() {
          let mesh = this.el.getObject3D("mesh");
          if (mesh) {
            loadEnvMap(scene.renderer, this.el);
          } else {
            this.el.addEventListener("model-loaded", () => {
              loadEnvMap(this.el.sceneEl.renderer, this.el);
            });
          }
        }
      });

      function loadEnvMap(renderer, entity) {
        let targetCube = new THREE.WebGLCubeRenderTarget(1048, {
          generateMipmaps: true,
          minFilter: THREE.LinearMipmapLinearFilter,
          magFilter: THREE.NearestFilter
        });
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1;
        renderer.outputEncoding = THREE.sRGBEncoding;

        let mesh = entity.getObject3D("mesh");
        let texture = new THREE.TextureLoader().load(
          "https://i.imgur.com/fO0KaHy.jpeg",
          function() {
            let cubeTex = targetCube.fromEquirectangularTexture(renderer, texture);
            mesh.traverse(function(el) {
              if (el.material) {
                el.material.envMap = cubeTex.texture;
                el.material.envMap.intensity = 1;
                el.material.needsUpdate = true;
              }
            });
          });
      }

    </script>
  </head>

  <body>
    <a-scene renderer="antialias: true; colorManagement: true;">
      <a-assets>
        <img id="sky" crossorigin="anonymous" src="https://i.imgur.com/fO0KaHy.jpeg">
        <a-asset-item id="model" src="https://cdn.jsdelivr.net/gh/addy1997/3D-models@main//Iron%20drone/iron_drone.glb"></a-asset-item>
      </a-assets>
      <a-entity id="camera" camera="near: 0.1; far: 1000" orbit-controls="
            target: 0 0 0;
            zoomSpeed: 3;
            minDistance: 0;
            maxDistance: 100;
            initialPosition: 5 2 5;
            autoRotate: true;
            autoRotateSpeed: 0.02;
            enablePan: true">
      </a-entity>
      <a-entity gltf-model="#model" scale="6 6 6" position="0 -6.5 0" envmap></a-entity>
      <a-sky src="#sky"></a-sky>
    </a-scene>
  </body>

</html>
