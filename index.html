    <!-- Custom component for camera logging -->
    <script>
      AFRAME.registerComponent('camera-logger', {
        schema: {
          timestamp: {
            type: 'int'
          },
          seconds: {
            type: 'int'
          }
        },
        init: function() {
          var cameraEl = this.el.sceneEl.camera.el;
          var rotation = cameraEl.getAttribute('rotation');
          var worldPos = new THREE.Vector3();
          worldPos.setFromMatrixPosition(cameraEl.object3D.matrixWorld);
          console.log("Time: " + this.data.seconds + "; Camera Position: (" + worldPos.x.toFixed(2) + ", " + worldPos.y.toFixed(2) + ", " + worldPos.z.toFixed(2) + "); Camera Rotation: (" + rotation.x.toFixed(2) + ", " + rotation.y.toFixed(2) + ", " + rotation.z.toFixed(2) + ")");
        },
        play: function() {
          this.data.timestamp = Date.now();
          this.init();
        },
        tick: function() {
          if (Date.now() - this.data.timestamp > 1000) {
            this.data.timestamp += 1000;
            this.data.seconds += 1;
            this.init();
          }
        },
      });

    </script>
    <!-- component to animate the meshes -->
    <script>
      AFRAME.registerComponent('animate', {
        init: function() {
          // wait until the model is loaded
          this.el.addEventListener("model-loaded", evt => {
            const mixer = new THREE.AnimationMixer(this.el.components['gltf-model'].model);
            const clips = this.el.components['gltf-model'].model.animations[0];
            mixer.clipAction(clips).play();
            // "expose" the animation mixer
            this.mixer = mixer;
          })
        },
        // on each render loop (actually before each render loop)
        tick: function(t, dt) {
          if (!this.mixer) return; // if the mixer exists
          this.mixer.update(dt / 1000) // update it with the delta time
        }
      })

    </script>
    <!-- component for mesh shadows -->
    <script>
      AFRAME.registerComponent('mesh-shadows', {
        init: function() {
          this.el.addEventListener('model-loaded', () => {
            const el = this.el;
            const obj = el.getObject3D('mesh');
            obj.traverse(function(node) {
              if (node.isMesh) {
                node.castShadow = true;
                node.receiveShadow = true;
                node.material.shadowSide = 1;
                node.material.roughness = 0.60;
                if (node.material.map) {
                  node.material.map.encoding = THREE.LinearEncoding;
                }
              }
            });
          });
        },
      });

    </script>

    <script>
      /* Ada Rose Cannon's components from XR boilerplate file */
      /* https://github.com/AdaRoseCannon/aframe-xr-boilerplate/tree/glitch */
      /* Change teleport gesture from 'point' to 'horns' */

      /* Attach to objects that will follow or appear attached to Player */
      AFRAME.registerComponent("xr-follow", {
        schema: {},
        init() {},
        tick() {
          const scene = this.el.sceneEl;
          const camera = scene.camera;
          const object3D = this.el.object3D;
          camera.getWorldPosition(object3D.position);
          object3D.parent.worldToLocal(object3D.position);
        }
      });

      /* Turn physics off and on when object is grabbed then released */
      AFRAME.registerComponent("toggle-physics", {
        events: {
          pickup: function() {
            this.el.addState('grabbed');
          },
          putdown: function(e) {
            this.el.removeState('grabbed');
            if (e.detail.frame && e.detail.inputSource) {
              const referenceSpace = this.el.sceneEl.renderer.xr.getReferenceSpace();
              const pose = e.detail.frame.getPose(e.detail.inputSource.gripSpace, referenceSpace);
              if (pose && pose.angularVelocity) {
                this.el.components['physx-body'].rigidBody.setAngularVelocity(pose.angularVelocity);
              }
              if (pose && pose.linearVelocity) {
                this.el.components['physx-body'].rigidBody.setLinearVelocity(pose.linearVelocity);
              }
            }
          }
        }
      });

      /* Add labels to hands to show pose detection */
      window.addEventListener("DOMContentLoaded", function() {
        const sceneEl = document.querySelector("a-scene"); // do we need this?
        const cameraRig = document.getElementById("cameraRig"); // do we need this?

        const labels = Array.from(document.querySelectorAll('.pose-label'));
        for (const el of labels) {
          el.parentNode.addEventListener('pose', function(event) {
            el.setAttribute('text', 'value', event.detail.pose);
          });
          el.parentNode.addEventListener('gamepad', function(event) {
            el.setAttribute('text', 'value', event.detail.event);
          });
        }
      });

    </script>

      <!-- Sickle Pro glTF -->
      <a-gltf-model id="sickle" gltf-model="#Sickle" rotation="180 180 0" scale="1 1 1" position="-0.88 0.75 -1.68" mesh-shadows></a-gltf-model>

      <!-- Denture glTF -->
      <a-gltf-model id="denture" gltf-model="#Denture" rotation="0 0 0" scale="0.0065 0.0065 0.0065" position="-0.92 0.68 -1.65" mesh-shadows></a-gltf-model>

      <!-- Scalpel glTF -->
      <a-gltf-model id="scalpels" gltf-model="#Scalpels" rotation="0 0 0" scale="0.35 0.35 0.35" position="-1 0.72 -1.65" mesh-shadows></a-gltf-model>

      <!-- Syringe glTF-->
      <a-gltf-model id="syringe" gltf-model="#Syringe" rotation="0 180 0" scale="0.00125 0.00125 0.00125" position="-0.82 0.72 -1.59" mesh-shadows></a-gltf-model>

      <!-- Mirror glTF-->
      <a-gltf-model id="mirror" gltf-model="#Mirror" rotation="0 0 0" scale="1 1 1" position="-0.78 0.72 -1.65" mesh-shadows></a-gltf-model>

      <!-- Compactor glTF-->
      <a-gltf-model id="compactor" gltf-model="#Compactor" rotation="0 180 0" scale="0.35 0.35 0.35" position="-0.75 0.72 -1.65" mesh-shadows></a-gltf-model>

      <!-- Room glTF -->
      <a-gltf-model id="room" gltf-model="#Room" rotation="0 0 0" scale="0.0095 0.0095 0.0095" position="-0.45 0 -1.5"></a-gltf-model>

      <!-- Dentist glTF -->
      <a-gltf-model id="dentist" gltf-model="#Dentist" rotation="0 30 0" scale="0.375 0.375 0.375" position="-0.15 1.25 -1.55" animate mesh-shadows frustum-culling-disabled></a-gltf-model>

      <!-- Floor glTF -->
      <a-gltf-model id="floor" gltf-model="#Floor" rotation="0 90 0" scale="0.065 0.065 0.065" position="-0.85 0.12 -3"></a-gltf-model>

      <!-- Dentist Chair glTF -->
      <a-gltf-model id="chair" gltf-model="#Dentist-Chair" rotation="0 -90 0" scale="0.75 0.75 0.75" position="-1.85 0.15 -3.25" mesh-shadows></a-gltf-model>

      <!-- Patient glTF -->
      <a-gltf-model id="patient" gltf-model="#Patient" rotation="-60.5 90 0" scale="0.75 0.75 0.75" position="-1.1 0.35 -3" mesh-shadows rotate-patient-legs="z_val: 0.785398" rotate-patient-hands="x_val: 0; y_val: 2.00713" rotate-spine="z_val:0.785398" rotate-neck="z_val:0.785398"></a-gltf-model>

      <!-- Table glTF -->
      <a-gltf-model id="table" gltf-model="#Table" rotation="0 90 0" scale="0.235 0.235 0.235" position="1.35 0 -1.45" mesh-shadows></a-gltf-model>

      <!-- Office Chair glTF-->
      <a-gltf-model id="office-chair" gltf-model="#Office-Chair" rotation="0 -90 0" scale="0.055 0.055 0.055" position="1.7 0.15 -1.45" mesh-shadows></a-gltf-model>

      <!-- Office Chair2 glTF-->
      <a-gltf-model id="office-chair2" gltf-model="#Office-Chair" rotation="0 90 0" scale="0.055 0.055 0.055" position="0.25 0.15 -1.65" mesh-shadows></a-gltf-model>

      <!-- Laptop glTF-->
      <a-gltf-model id="laptop" gltf-model="#Laptop" position="1.35 0.81 -1.65" rotation="0 -90 0" scale="0.4 0.4 0.4" mesh-shadows></a-gltf-model>

      <!-- Trolley glTF-->
      <a-gltf-model id="trolley" gltf-model="#Trolley" rotation="0 180 0" scale="0.0075 0.0075 0.0075" position="-0.85 0.125 -1.70" mesh-shadows></a-gltf-model>

      <!-- Cabinet glTF-->
      <a-gltf-model id="cabinet" gltf-model="#Cabinet" rotation="0 -90 0" scale="0.95 0.95 0.95" position="-0.05 0.12 -4" mesh-shadows></a-gltf-model>

      <!-- Fire extinguisher glTF-->
      <a-gltf-model id="fire-extinguisher" gltf-model="#Fire-extinguisher" rotation="0 -90 0" scale="0.95 0.95 0.95" position="-0.05 0.9 -1.81" mesh-shadows data-pick-up class="magnet-left magnet-right"
                    data-magnet-range="0.2,0.1,360,-90"></a-gltf-model>
      
      <!-- Dustbin glTF-->
      <a-gltf-model id="dustbin" gltf-model="#Dustbin" rotation="0 -90 0" scale="0.2 0.175 0.2" position="1.85 0.55 -1.15" mesh-shadows></a-gltf-model>

      <!-- Partition glTF-->
      <a-gltf-model id="partition" gltf-model="#Partition" rotation="0 -45 0" scale="0.825 0.825 0.825" position="5.5 0.30 1.75" mesh-shadows></a-gltf-model>

      <!-- Partition 2 glTF-->
      <a-gltf-model id="partition2" gltf-model="#Partition" rotation="0 -135 0" scale="0.825 0.825 0.825" position="-5.5 0.30 7.5" mesh-shadows visible="false"></a-gltf-model>

      <!-- Camera system -->
      <a-entity id="camera-control" movement-controls="speed:0.2;camera:#camera-head">

        <!-- Camera head -->
        <a-entity id="camera-head" camera position="-0.74 1.25 -0.26" wasd-controls="acceleration: 8" look-controls="pointerLockEnabled:true;"></a-entity>

        <!-- Ada Rose Cannon's handy-work component -->
        <a-entity handy-controls="right:#Right-hand;materialOverride:right;" material="color:gold;metalness:1;roughness:0;">

          <!-- Screen space inputs like mobile AR -->
          <a-torus radius="0.008" radius-tubular="0.001" material="shader:flat;color:blue" data-none="screen-0"></a-torus>
          <a-torus radius="0.008" radius-tubular="0.001" material="shader:flat;color:green" data-none="screen-1"></a-torus>
          <a-torus radius="0.008" radius-tubular="0.001" material="shader:flat;color:red" data-none="screen-2"></a-torus>

          <!-- Objects attached to tracked hand joints -->
          <a-gltf-model src="#Watch" data-left="wrist" position="-1000 0 0">
            <a-sphere radius="0.02" position="0 0.02 0" sphere-collider="radius:0.02;objects:[data-right$=-tip];" exit-on="hitend" visible="false"></a-sphere>
          </a-gltf-model>
          <a-entity data-left="ring-finger-phalanx-proximal">
            <a-torus position="0 0 -0.03" radius="0.008" radius-tubular="0.001" scale="1 1 1.5" material="color:gold;metalness:1;roughness:0;"></a-torus>
          </a-entity>

          <a-entity data-right="index-finger-tip" mixin="blink" blink-controls="rotateOnTeleport:false;startEvents:pose_point_fuseShort;endEvents:pose_point_fuseLong;"></a-entity>
          <a-entity data-left="index-finger-tip" mixin="blink" blink-controls="rotateOnTeleport:false;startEvents:pose_point_fuseShort;endEvents:pose_point_fuseLong;"></a-entity>

          <!-- Ray and Grip are Available on Hands or Tracked Inputs -->
          <a-entity data-right="ray" mixin="blink" blink-controls>
            <a-entity position="0 0 -0.22" class="pose-label" text="value: Hello World; align: center;"></a-entity>
          </a-entity>
          <a-entity data-left="ray" mixin="blink" blink-controls>
            <a-entity position="0 0 -0.22" class="pose-label" text="value: Hello World; align: center;"></a-entity>
          </a-entity>

          <!-- These act like anchors pulling both hands and controllers towards grabable objects, moving the whole hand and the attached elements-->
          <a-entity id="right-magnet" data-right="grip" data-magnet=".magnet-right:not([data-no-magnet]),.magnet:not([data-no-magnet])" grab-magnet-target="startEvents:squeezestart,pose_fist;stopEvents:pose_flat_fuseShort,squeezeend;"></a-entity>
          <a-entity id="left-magnet" data-left="grip" data-magnet=".magnet-left:not([data-no-magnet]),.magnet:not([data-no-magnet])" grab-magnet-target="startEvents:squeezestart,pose_fist;stopEvents:pose_flat_fuseShort,squeezeend;"></a-entity>

          <!-- Markers to let us know the real location of the hands -->
          <a-sphere id="right-no-magnet" data-right="grip" data-no-magnet radius="0.01" color="red"></a-sphere>
          <a-sphere id="left-no-magnet" data-left="grip" data-no-magnet radius="0.01" color="red"></a-sphere>

          <!-- Invisible objects at the tips of each finger for physics or intersections -->
          <a-sphere data-right="index-finger-tip" radius="0.01" visible="false"></a-sphere>
          <a-sphere data-right="middle-finger-tip" radius="0.01" visible="false"></a-sphere>
          <a-sphere data-right="ring-finger-tip" radius="0.01" visible="false"></a-sphere>
          <a-sphere data-right="pinky-finger-tip" radius="0.01" visible="false"></a-sphere>
          <a-sphere data-right="thumb-tip" radius="0.01" visible="false"></a-sphere>
          <a-sphere data-left="index-finger-tip" radius="0.01" visible="false"></a-sphere>
          <a-sphere data-left="middle-finger-tip" radius="0.01" visible="false"></a-sphere>
          <a-sphere data-left="ring-finger-tip" radius="0.01" visible="false"></a-sphere>
          <a-sphere data-left="pinky-finger-tip" radius="0.01" visible="false"></a-sphere>
          <a-sphere data-left="thumb-tip" radius="0.01" visible="false"></a-sphere>
        </a-entity>

      </a-entity>

      <!-- Lighting -->
      <a-entity light="type: point; color: #f4f4f4; intensity: 0.2" position="8 10 18"></a-entity>
      <a-entity light="type: point; color: #f4f4f4; intensity: 0.2; distance: 0" position="-0.45 1.1 -1.5"></a-entity>
      <a-entity light="type: point; color: #f4f4f4; intensity: 0.2; distance: 0" position="1.45 1.68 -2"></a-entity>
      <a-entity light="type: ambient; color: #f4f4f4; intensity: 0.6;" position="-8 10 -18"></a-entity>
    </a-scene>
  </body>

</html>
