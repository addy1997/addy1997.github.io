    <script>
      AFRAME.registerComponent('mesh-shadows', {
        init: function() {
          this.el.addEventListener('model-loaded', () => {
            const el = this.el;
            const obj = el.getObject3D('mesh');
            obj.traverse(function(node) {
              if (node.isMesh) {
                node.castShadow = true;
                node.receiveShadow = true;
                node.material.shadowSide = 1;
                node.material.roughness = 0.60;

                if (node.material.map) {
                  node.material.map.encoding = THREE.LinearEncoding;
                }
              }
            });
          });
        },
      });

    </script>
    <script>
      AFRAME.registerComponent('gltf-modifier', {
        schema: {
          color: {
            type: 'string',
            default: '#FFFFFF'
          },
          transparent: {
            type: 'string',
            default: false
          },
          opacity: {
            type: 'float',
            default: 1.0
          },
          blending: {
            type: 'string',
            default: "normal"
          },
          emissive: {
            type: 'string',
            default: "#FFFFFF"
          },
          //shading: {
            //type: 'string',
            //default: "flat"
          //}
        },
        init: function() {

          let blending;
          if (this.data.blending == "additive") {
            blending = THREE.AdditiveBlending
          } else {
            blending = THREE.NormalBlending;
          }

          let material;
          let parameters = {
            color: this.data.color,
            transparent: this.data.transparent,
            opacity: this.data.opacity,
            blending: blending
          };
          if (this.data.shading == "flat") {
            material = new THREE.MeshBasicMaterial(parameters);
          } else {

            material = new THREE.MeshLambertMaterial(parameters);
          }

          let self = this;

          this.el.addEventListener("model-loaded", function(eventData) {
            let model = eventData.detail.model;
            model.traverse((obj) => {
              if (obj.isMesh && obj.material) {
                obj.material.color = new THREE.Color(self.data.color);

                obj.material.emissive = new THREE.Color(self.data.emissive);

                obj.material.transparent = self.data.transparent;

                obj.material.opacity = self.data.opacity;

                if (self.data.blending == "additive")
                  obj.material.blending = THREE.AdaptiveBlending;
                else if (self.data.blending == "normal")
                  obj.material.blending == THREE.NormalBlending;
              }
            });
          });
        }
      })

    </script>
