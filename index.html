<html>
<head>
  <title>Most Basic Super-Hands Example</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.misc.min.js"></script>
  <script src="https://unpkg.com/super-hands/dist/super-hands.min.js"></script>
</head>

<body>
  <a-scene>
    <a-assets>
      <a-asset-item id="panda" src="https://cdn.jsdelivr.net/gh/addy1997/3D-models@main/Panda/panda.glb"></a-asset-item>
    </a-assets>
    <a-entity>
      <a-camera></a-camera>
      <a-entity sphere-collider="objects: a-gltf-model" super-hands hand-controls="hand: left"></a-entity>
      <a-entity sphere-collider="objects: a-gltf-model" super-hands hand-controls="hand: right"></a-entity>
    </a-entity>
     <a-gltf-model src="#panda" rotation="0 45 0" scale="2.5 2.5 2.5" position="0 0 -1" hoverable grabbable stretchable draggable droppable></a-gltf-model>
    <!-- hover & drag-drop won't have any obvious effect without some additional event handlers or components. See the examples page for more -->
    <a-box hoverable grabbable stretchable draggable dropppable color="blue" position="-3 0 -1"></a-box>
    
  </a-scene>
</body>
</html>
