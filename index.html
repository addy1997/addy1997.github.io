<html>
  <head>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.misc.min.js"></script>
    <script src="https://unpkg.com/super-hands@^3.0.3/dist/super-hands.min.js"></script>
    <script>
AFRAME.registerComponent('rotatable', {
  dependencies: ['grabbable', 'stretchable', 'draggable'],
  init: function () {
    this.el.addEventListener('grab-start', (e) => this.start(e));
    this.el.addEventListener('grab-end', (e) => this.end(e));
    this.grabOffsetMatrix = new THREE.Matrix4();
    this.parentOffsetMatrix = new THREE.Matrix4();
  },
  tick: (function () {
    const grabeeMatrix = new window.THREE.Matrix4()
    const ignoreScale = new window.THREE.Vector3()
    return function () {
      if (this.grabbed) {
        grabeeMatrix.multiplyMatrices(
          this.grabber.object3D.matrixWorld,
          this.grabOffsetMatrix
        )
        grabeeMatrix.multiplyMatrices(this.parentOffsetMatrix, grabeeMatrix)
        // using decomp over direct Object3D.matrix manipulation
        // keeps in sync with other A-Frame components
        grabeeMatrix.decompose(
          this.el.object3D.position,
          this.el.object3D.quaternion,
          // let stretchable manage scale
          ignoreScale
        )
      }
    }
  })(),

  resetGrabber: function () {
    if (!this.grabber) {
      return false
    }
    this.grabber.object3D.updateMatrixWorld()
    this.el.object3D.parent.updateMatrixWorld()
    // save difference between grabber world matrix and grabee world matrix
    this.grabOffsetMatrix.copy(this.grabber.object3D.matrixWorld);
    this.grabOffsetMatrix.invert();
    this.grabOffsetMatrix.multiply(this.el.object3D.matrixWorld);
    // save difference between grabee world and local matrices
    this.parentOffsetMatrix.copy(this.el.object3D.parent.matrixWorld);
    this.parentOffsetMatrix.invert();
    return true;
  },
  start: function (e) {
    this.grabbed = true;
    this.grabber = e.detail.hand;
    this.resetGrabber();
  },
  end: function (e) {
    this.grabbed = false;
  }
});

    </script>
  </head>
  <body>
    <a-scene>
      <a-entity>
        <a-camera></a-camera>
        <a-entity sphere-collider="objects: a-box, a-sphere, a-cylinder" super-hands hand-controls="hand: left"></a-entity>
        <a-entity sphere-collider="objects: a-box, a-sphere, a-cylinder" super-hands hand-controls="hand: right"></a-entity>
      </a-entity>
      <a-sky color="#ECECEC"></a-sky>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <a-box grabbable rotatable stretchable draggable position="-1 0.5 -1.5" rotation="0 45 0" color="#4CC3D9"></a-box>
      <a-sphere grabbable rotatable stretchable draggable position="0 1.25 -2" radius="0.5" color="#EF2D5E"></a-sphere>
      <a-cylinder grabbable rotatable stretchable draggable position="1 0.75 -1" radius="0.5" height="0.5" color="#FFC65D"></a-cylinder>
      <a-box grabbable rotatable stretchable draggable color="blue" depth="0.5" height="0.5" width="0.5" position="0 1.5 -1"></a-box>
    </a-scene>
  </body>
</html>
