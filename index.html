<!DOCTYPE html>
<html>

  <head>
    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="//cdn.rawgit.com/donmccurdy/aframe-extras/v6.0.0/dist/aframe-extras.min.js"></script>
    <script src="//cdn.rawgit.com/donmccurdy/aframe-physics-system/v3.2.0/dist/aframe-physics-system.min.js"></script>
  </head>

  <body>
    <a-scene physics="debug: true">
      <!-- Player -->
      <a-entity camera look-controls></a-entity>

      <!-- Left hand -->
      <a-entity id="leftController" static-body="shape: sphere; sphereRadius: 0.02;" oculus-touch-controls="hand: left" sphere-collider="objects: .throwable" grab>
      </a-entity>

      <!-- Right hand -->
      <a-entity id="rightController" static-body="shape: sphere; sphereRadius: 0.02;" oculus-touch-controls="hand: right" sphere-collider="objects: .throwable" grab>
      </a-entity>

      <a-box id="anchor1" width="0.01" height="0.01" depth="0.01" static-body animation="property: position; from: 0 0.5 -0.5; to: 0 2 -0.5; easing: easeInOutCubic; dur: 4000; dir: alternate; loop: true">
      </a-box>
      <a-sphere id="sphere1" position="0 0.5 -0.5" radius="0.10" color="#4CC3D9" dynamic-body="shape: sphere" constraint="type: distance; target: #anchor1; distance: 0.001; collideConnected: false">
      </a-sphere>

      <a-box id="anchor2" width="0.01" height="0.01" depth="0.01" static-body animation="property: position; from: -0.5 0.5 0.5; to: 0.5 0.5 0.5; easing: easeInOutCubic; dur: 4000; dir: alternate; loop: true" visible="false">
      </a-box>
      <a-sphere id="sphere2" position="-0.5 0.5 0.5" radius="0.10" color="#FFC65D" dynamic-body="shape: sphere" constraint="type: distance; target: #anchor2; distance: 0.00001; collideConnected: false" visible="false">
      </a-sphere>

      <a-sphere id="sphere3" position="0 0.5 -0.5" radius="0.10" color="#4CC3D9" dynamic-body="shape: sphere" constraint="type: distance; target: #cube3; distance: 0.001; collideConnected: false">
      </a-sphere>

      <a-box id="cube1" dynamic-body position="0 0.25 -1" width="0.5" height="0.5" depth="0.5" color="violet" animation="property: position; from: 0 0.5 -0.5; to: 0 2 -3.25; easing: easeInOutCubic; dur: 4000; dir: alternate; loop: true"></a-box>

      <a-box id="cube2" dynamic-body position="-1 0.25 -1" width="0.5" height="0.5" depth="0.5" color="green" animation="property: position; from: 0 0.5 -0.5; to: 0 2 -1.25; easing: easeInOutCubic; dur: 4000; dir: alternate; loop: true"></a-box>

      <a-box id="cube3" dynamic-body position="1 0.25 -1" width="0.5" height="0.5" depth="0.5" color="yellow" animation="property: position; from: 0 0.5 -0.5; to: 0 2 -2.25; easing: easeInOutCubic; dur: 4000; dir: alternate; loop: true"></a-box>

      <!-- Terrain -->
      <a-grid static-body></a-grid>

      <!-- Lighting -->
      <a-entity light="type: point; color: #f4f4f4; intensity: 0.2; distance: 0" position="8 10 18"></a-entity>
      <a-entity light="type: point; color: #f4f4f4; intensity: 0.6; distance: 0" position="-8 10 -18"></a-entity>
      <a-entity light="type: ambient; color: #f4f4f4; intensity: 0.4;" position="-8 10 -18"></a-entity>
    </a-scene>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        let scene = document.querySelector('a-scene');

        let giftCount = 0;

        function giftAvalanche() {
          let gift = document.createElement('a-box');

          let size = Math.random() * 0.40 + 0.1;
          gift.setAttribute('width', size);
          gift.setAttribute('height', size);
          gift.setAttribute('depth', size);
          gift.setAttribute('color', 'hsl(' + Math.random() * 360 + ', 90%, 70%)');
          gift.setAttribute('position', (Math.random() * 2 - 1) + ' 2.6 ' + (Math.random() * 2 - 1));
          gift.setAttribute('dynamic-body', 'shape: box; mass: 2');
          gift.classList.add('throwable');

          scene.appendChild(gift);

          if (++giftCount < 50) window.setTimeout(giftAvalanche, 150);
        }

        document.querySelector('#sphere1').addEventListener('collide', (e) => {
          if (e.detail.body.el.id === 'leftController' || e.detail.body.el.id === 'rightController') {
            e.detail.target.el.setAttribute('visible', 'true');
            document.querySelector('#anchor1').setAttribute('visible', 'true');
            document.querySelector('#anchor2').setAttribute('visible', 'true');
            document.querySelector('#sphere2').setAttribute('visible', 'true');

          }
        });
        
        document.querySelector('#sphere3').addEventListener('collide', (e) => {
          if (e.detail.body.el.id === 'leftController' || e.detail.body.el.id === 'rightController') {
            e.detail.target.el.setAttribute('visible', 'true');
            document.querySelector('#anchor2').setAttribute('visible', 'true');
            document.querySelector('#cube3').setAttribute('visible', 'true');
            document.querySelector('#sphere2').setAttribute('visible', 'true');
            document.querySelector('#sphere1').setAttribute('visible', 'true');
          }
        });

        document.querySelector('#sphere2').addEventListener('collide', (e) => {
          if (e.detail.body.el.id === 'leftController' || e.detail.body.el.id === 'rightController') {
            e.detail.target.el.setAttribute('visible', 'true');
            document.querySelector('#anchor2').setAttribute('visible', 'true');

            scene.systems.physics.driver.world.gravity.set(0, -9.81, 0);
            giftAvalanche();
          }
        });
      });

    </script>
  </body>

</html>
