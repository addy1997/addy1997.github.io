<!DOCTYPE html>
<html>

  <head>
    <meta charset="utf-8" />
    <title>Stormtrooper and Elf model</title>
    <!-- A-Frame JavaScript library -->
    <script src="https://aframe.io/releases/0.3.2/aframe.min.js"></script>
    <!-- A-Frame physics system -->
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-physics-system@v1.0.3/dist/aframe-physics-system.min.js"></script>
    <!-- A-Frame extras -->
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v2.6.1/dist/aframe-extras.min.js"></script>
  </head>

  <body>
    <a-scene fog="type: linear; color: #FFEBDE; far:195">

      <a-assets>
        <a-asset-item id="ground" src="https://cdn.rawgit.com/7ammer/testfiles/master/aframe-ground-physics/floor.dae"></a-asset-item>

        <a-asset-item id="stormtrooper-model" src="https://raw.githubusercontent.com/gftruj/webzamples/master/aframe/assets/models/stormtrooper/stormtrooper.dae"></a-asset-item>

        <a-asset-item id="elf-model" src="https://raw.githubusercontent.com/gftruj/webzamples/master/aframe/assets/models/elf/elf.dae"></a-asset-item>

      </a-assets>

      <!-- Left hand -->
      <a-entity id="leftController" oculus-touch-controls="hand: left">
      </a-entity>

      <!-- Right hand -->
      <a-entity id="rightController" oculus-touch-controls="hand: right">
      </a-entity>

      <!-- camera -->
      <a-entity camera universal-controls jump-ability kinematic-body position="0 2 10">
      </a-entity>

      <!-- ground -->
      <a-entity static-body collada-model="#ground"></a-entity>

      <!-- stormtrooper model -->
      <a-entity position="4 0 1" scale="2 2 2" rotation="-270" static-body collada-model="#stormtrooper-model"></a-entity>

      <!-- elf model -->
      <a-entity position="-2 0 1" scale="1 1 1" static-body collada-model="#elf-model"></a-entity>
    </a-scene>
  </body>

</html>
